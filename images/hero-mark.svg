<svg class="stamp" viewBox="0 0 500 500" aria-label="Canyon mark" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <clipPath id="stampClip">
      <rect x="50" y="50" width="400" height="400" rx="12"/>
    </clipPath>
  </defs>
  <g filter="url(#rough)">
    <rect x="50" y="50" width="400" height="400" fill="#F0660A"/>
  </g>
  <g clip-path="url(#stampClip)">
    <rect x="50" y="50" width="400" height="260" fill="#F0660A"/>
    <circle cx="360" cy="170" r="32" fill="#1A0F0C"/>
    <path d="M50 310 L130 210 L200 260 L260 160 L320 220 L400 140 L450 230 L450 310 Z" fill="#2A1A16" opacity="0.9"/>
    <path d="M50 450 L50 330 L100 300 L140 320 L160 290 L200 310 L210 270 L250 260 L260 300 L300 290 L320 270 L350 280 L370 250 L400 260 L420 290 L440 280 L450 310 L450 450 Z" fill="#1A0F0C"/>
    <g opacity="0.3">
      <line x1="80" y1="360" x2="420" y2="360" stroke="#F0660A" stroke-width="2"/>
      <line x1="80" y1="390" x2="420" y2="390" stroke="#F0660A" stroke-width="1.5"/>
      <line x1="80" y1="420" x2="420" y2="420" stroke="#F0660A" stroke-width="1"/>
    </g>
  </g>
  <text x="250" y="485" text-anchor="middle" font-family="'Archivo Black', sans-serif" font-size="56" fill="#F2ECE3" letter-spacing="2">CANYON</text>
</svg>
